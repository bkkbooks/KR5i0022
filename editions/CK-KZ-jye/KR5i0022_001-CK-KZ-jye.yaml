body:
  text: 玉清贊化九天演政心印寶懺懴序關聖帝君曰大士有言曰上士悲懴中士疚懴下士警懴余謂上士法天者也中士反天者也下士畏天者也此于其平時之常敬與否也辨之兹懴首揭曰敬之敬之天維顯思夫人能常敬則温柔敦厚可以立地登天天也者非徒寥廓清虚之謂乃道之大原所自出也人能以心印道居敬存誠則無處非天矣况此懴也擷中和之真氣發天地之性光借詩教以淘情託詠懷而洗義能使六根清淨五炁周流不識不知順帝之則是陶鈞斯民于太和元氣中者由是而三教種子皆得心若明星各發文章性與天道轉相導引仁風徧宇道氣充天不胥由心印懴之育人神化也哉世有拘人或展卷而逞其執抝之説余故發明此義以表此懴之功用而登我多士于常敬之天也是爲序
