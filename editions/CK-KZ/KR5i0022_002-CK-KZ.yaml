也言庶民小子愚昧者多以視蒼蒼之天謂夢夢然而不明遂自違僻其明德昏亂椓䘮不供人職如子不孝臣不忠兄不友弟不㳟之類是也故皇天厭惡而棄絶之發於雷霆大曰雷小曰霆雷主善霆主惡是即雷霆府院之所判令也雷鳴而人肅㳟霆震而人戰慄以彰天之威靈而非夢夢也惟文尼道君受命于昊天上帝誡諭雷霆五師之衆徧昭其德宣布其威我民自然相與顧忌兢業于心而不敢爲惡以敬畏上天之變怒時時戒謹在在危懼即發一言一行必先尋繹天理深思人道惟恐或有未合於天之處然念我尚無福力感格皇天惟求五祖真君喜我樂我以助我爲人之道以得完我明德庻無愧怍于天人之際也維彼不順爲鬼爲蜮爲民不利豈曰不極肆皇天弗尚如雷如霆載震載夙以赫厥靈惟兹皇祖受命自天戒我師旅來旬來宣我龍受之上天之載以謹昏怓毋俾正敗伐鼓淵淵旟旐有翩衎我烈祖佛時仔肩如降魔除祟則誦此不順謂不順乎天也鬼隂魄也蜮短狐也極謂極其毒害也龍讀寵與寵同載事也謹歛束之意昏怓猶讙譁也正敗正道敗壞也淵淵聲尚和平而未暴怒也旟畫鳥隼旗也旐旂旐也翩翩翻動也言維彼不順於天之物則爲鬼怪爲妖蜮以爲我民大不利豈不毒害極致哉故皇天厭棄而發于雷霆震驚戰肅以顯其靈惟道君受命於天誡諭雷霆師衆徧昭其德宣布其威以除民之大害我既得承天寵受兹心印職當代天宣化輔正摧邪禁其讙譁歛其妖孽勿使正道少有敗壞故伐鼓以迎神淵然和平以期神化建旗以招靈翩然從容使自皈依五師真君出傳正法以至我諒必聞而喜樂之而助我以任此護道降魔之職也懴禱已陳㳟申諷詠稽首皈依大法師五宗流演萬千沠無邊法力大神通凡曰有生均感戴玉帝曩謨選世仙光明遴入金仙隊我今皈命復皈神慧目常明垂顧盼嗣法掌雷霆願叨法庇誅邪祟一心回向九天心印會上大慈尊三稱下土小兆某等伏聞經籙法籙乃天地之玄宗運化之寳典欽承玉帝慈悲設院分庫以蔵天寳故兆等願求經法咸得受持今應投誠一心敬禮一心敬禮祖師經法全籙都提總紫清白大真君祖師經籙内院都提按金輪梅大真君祖師經籙外院都提按洞淵沈大真君祖師法籙内院都提按冲靖留大真君祖師法籙外院都提按都功彭大真君祖師經籙内院左庫都提典李大真人祖師經籙内院右庫都提典陳大真人祖師經籙外院左庫都提典林大真人祖師經籙外院右庫都提典張大真人祖師法籙内院左庫都提典張大真人祖師法籙内院右庫都提典洪大真人祖師法籙外院左庫都提典潘大真人祖師法籙外院右庫都提典施大真人經籙法籙四院八庫六時提核無量仙真經籙法籙四院八庫六時守護無量神王下土靈壇經筵法座侍宸典禁一切真靈信禮已周仰對慈尊㳟申懴禱某等伏思民之方殿屎匪大猶是經以先祖受命人尚乎由行肆成人有德以對于天下俾爾彌爾性俾爾昌而大我求懿德威儀是力古訓是式孔淑不逆維民之則命于下國則莫我敢遏殿屎無知呻吟之貌猶道也經常也先祖先輩各宗之祖師也由循也對答也彌終也性謂天命威可畏也力勉也古訓即大蔵經法古大人先生之遺典也命猶令也下國謂下土四海九州也孔甚大也淑柔順也不逆不悖于道也言下民愚迷不逢指引方在無知呻吟之際斷不能自尋大道以爲常行之路幸先輩列祖高真受天之命暢演經法宣布人間人于是而知所遵行故凡成乎人者苟有明德以對揚上天下地之神靈而立于天地之間然後得以壽考福祿終爾天年佑啟後嗣昌盛光大則我何不于經于法求我本然之美德勉于威儀法于古訓務使柔順爲德不悖于道以爲後民之所取法夫我果根本于經法則雖行萬國九州亦莫敢遏我所宣之常經矣此即十七大光明之終歸于無能勝也惟經法實然懴禱已陳㳟申諷詠稽首皈依大蔵王真經妙法諸提核洋洋法語聖謨存浩浩神通與道德玉帝曩謨啓蔵傳九旒三冕遥而集我今珍重得受持生生世世服無斁一心回向九天心印會上大慈尊三稱下土小兆某等伏聞人欲登天必由傳度神而演政不外經綸欽承玉帝慈悲簡設二同以主其事故兆等求玄得明道德今應投誠一心敬禮一心敬禮祖師仙真傳度登天明道真君祖師經綸演政神璣明德真君登天幕府承宗受戒歴代得道師尊神璣幕府過化存神歴代得道師尊信禮已周仰對慈尊㳟申懴禱某等伏思天之牖民靡所止疑降予卿士率由羣匹教之誨之有孝有德君之宗之以引以翼庶民小子亦又何求有馮有翼式固爾猶宣哲維人敷政優優天命不僭我獨不敢休我其夙夜是致是附順彼長道無沗皇祖繩其祖武何求為我誕先登于岸俾緝熈于純嘏牖開明也言天啓其心也疑音兀定也降奉天命而降鍳也卿士謂傳度演政二師皆玄都正卿位列玉清師相也率由皆領也羣衆也匹類也君法也宗主也馮謂可爲依者翼謂可爲輔者優優寛裕之意僭賞之差也致推極也附謂躡于道也長道無增無减之常道也繩繼也武跡也誕發語辭岸道之極至謂到家處也嘏福也言天欲啓下民之心以爲善無所定止故降二師相以司登天神璣二幕總領庶民教以孝誨以德使之慈祥純孝篤實輝光可以興起善端涵養德性鎮其躁妄消其邪念日改月化則民皆有所法而有所宗又恐其䧟于一偏故復導其前後輔其左右務使不即不離不偏不倚以馴致乎中庸之道而後已如是而庶民小子亦又何所歉求其未能特達者則有傳度真君可以爲依傅其未能自立者則有演政真君可以爲保輔以此憑翼式固爾道心其聰明睿智之人亦知感天之敷政寛以撫民裕以養民矣然夭命終不可僭則我何敢獨惰而休息耶正當夙夜不懈以致乎功用之極以附