爲莫非天理之流行而無一毫人欲之私我今思與普天下脩士同此法筵以對越諸神在天之靈惟願天神降鍳普賜光明同發大願同具大力同登道岸此我所深長以思將思繼承祖師之緒雖没世而不敢忘者也懴禱已陳㳟申諷詠稽首皈依三界神當壇過徃而來會聰明正直總依人來視民視聽民聽禱爾神祗乞證盟證盟心印演天政我今依教建靈壇神光洞照遊于湛一心回向九天心印會上大慈尊三稱下土小兆某等伏聞靈壇就觧神保聿歸終應投誠一心敬禮一心敬禮彌羅玉勅覆䕶靈壇飛天神王靈壇青龍白虎朱雀玄武神君靈壇天門地戶人門鬼路神君靈壇禁忌百靈神祗靈壇辟非遵化魔王靈壇土地助道真官靈壇威靖司命六神萬法雷司遣䕶吏兵方嶽鎮瀆遣䕶吏兵隍社所遣承䕶吏兵威靖所屬承䕶吏兵聞經餐法六道四生信禮已周仰對慈尊㳟申懴禱某等伏思陳錫哉周旣昭假爾神之聽之保佑命爾俾爾多益天保定爾念我土宇神保是格卜爾百福如幾如式以妥以侑永錫爾極陳謂敷陳懴法也錫謂天錫福禄也周周圓也昭假昭然降格也益利益也保安也神保謂靈壇保護諸神也卜子也幾期也式法也妥謂拜告以安之也侑勸也謂祝侑以勸神享也極衆善之所歸也言我之敷陳懴法與天之恩錫福禄今巳初圓而天神旣昭然而降格矣神明之聽我懴悔亦旣保佑我之天命矣我能承受一神明之利益亦天然安定于我矣特念靈壇建此土地尚賴在壇保䕶諸神爲我感格故得卜此百福其來如期其多如法今則懴禮已周正當拜謝以安神靈尚再享我齋筵我惟脩我心印致至善之地皈道君之極永持勿失以希入聖然後可以報爾諸神守䕶靈壇之大德也懴禱巳陳㳟申諷詠稽首皈依靈壇上欽承勅䕶大靈神四衛四隅并百靈神魔社命威壇靖法䕶靈壇諸吏兵四生六道均歸命我今懴禮已周圓觧壇如法存心印一心回向九天心印會上大慈尊三稱禮懴已周㳟對道塲皈依三寳稽首皈依無上道願衆生世世生生皈神體大道一心回向無上道寳大慈尊稽首皈依無上法願衆生世世生生皈命持妙法一心回向無上法寳大慈尊稽首皈依無上師願衆生世世生生皈身事聖師一心回向無上師寳大慈尊既申回向如願奉行圓懴讚皈依已竟心印常存九天懴法頌於論兆等禮慈尊有路登真窮刼有餘恩大聖傳經示懴大慈尊三稱三拜簡癸全伏按懴内如戊庚壬下諸簡拜號繁長信禮者精神未逮不如停息惟進出之際應有祝陳兹譜祝辭二首當壇信禮玉簡方長凡民神氣苦飛揚丐養出壇塲法䕶神王爲我訴天堂九天心印會上大慈尊三稱三拜右讚告停時祝之來從靜默氣足神完虔誠傾倒進靈壇香火未嘗寒對越齋筵繼序禮天官九天心印會上大慈尊三稱三拜右讚重進時祝之惟簡乙百號似應一逕禮足不宜告停氣有不足者可依經文連成十三號共拜十五拜其餘𡨴告停勿連號而稱拜焉嗣龍門宗支第九代陶太定謹識
