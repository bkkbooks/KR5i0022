front:
  text: 玉清贊化九天演政心印寶懺道藏輯要箕集十一玉清贊化九天演政心印寳懴
  hash: sha256:edff1911f0ce465a789bd0cfce0a484d0978a64244b95351cc2a8911694b815d
  markers:
  - {type: page-break, offset: 12, content: '', id: YP-P_KR5i0022_02p001a}
body:
  text: 真空無礙大真人沈註辭臣沈一炳㳟惟寳懴懴辭乃九天證盟法語辭短音長意深義顯懴陳之下神聴和平原非註而後明實非註而得明臣竊仰體聖衷良爲下世蠢愚而設其有仁見謂仁知見謂知能自尋文揣義各窺其天臣固不敢援引多端窮搜奥義若夫法閫秘賾有非下士所得聞臣亦未敢取以爲據章句之法不敢言玄隱之理不敢道誠恐拘文牽義反啓下民悞觧之端惟熨其懴禱之情順文直註如左開懴讃金經既襲玉簡初陳人知有路反天眞從此好脩身志氣如神歸命感陶鈞大聖傳經示懴大慈尊三稱三拜玉清贊化九天演政心印寳懴沈一炳註辭簡甲道塲衆等普運精䖍啓懴如法大衆凝神俯伏運工有口口相傳心印訣次念啟懴真言啓懴真言敬之敬之天維顯思舉心動念天地皆知毋曰道遠日監在兹具有情辭謹當敷奏入意愚忱已布聰聴必聞㳟望慈尊證盟脩奉迎聖讃衆隨存想諸聖普降壇塲神靈顯赫稽首㳟迓諸聖真雲車風馬香花散衆御來如雨降天慈光遍及十方外靈壇金碧悉莊嚴堂皇冠冕咸如在天保赤子惟誠求令今所啓皆如願一心歸命九天心印會上大慈尊三稱下土小兆某等伏聞人法天天法道道法自然今首投誠一心敬禮末句或稱志心歸命亦可一心敬禮改稱志心歸命禮亦可下仿此龍漢開運玉清神母元君玉清聖境天寳妙無上帝上清真境靈寳妙有上帝太清仙境神寳至真上帝金闕至尊昊天玉皇上帝紫微上宫句陳天皇大帝瑶天星主北極紫微大帝七寳黄房后土皇靈地祗九霄九宸九天上帝十方十極十境高真五方五靈五老上帝四極四聖真王大帝九天玉虚生神上帝三十六天天主玉帝東華青童木公道君西漢金晶祖母元君日宫儀太陽帝君月府玦璘太隂皇君三元三品三官大帝四極四聖四天上帝西方極樂雷音天帝南洋闡教碧落天帝九天開化文昌帝君三界伏魔靈佑帝君萬天司鐸太虚帝君經筵侍宸無鞅聖衆法筵侍宸無鞅聖衆信禮已周仰對慈尊㳟申懴禱某等伏思天生烝民有物有則民之秉彛好是懿德哀我人斯覆出爲惡相在爾室有靦靣日皇矣上帝實維我儀我求懿德則不我遺我其夙夜不敢怠遑惟天之命示我顯德行烝衆也則法也秉執也彛常也懿美也哀憫也斯指習染而言也覆反也相視也靦靣目見人之貌皇大也儀象也則例也遺棄也夙謂平旦之氣也夜謂夜氣清明也遑暇也顯明也言天生衆民有是物必有是則葢自百骸九竅五臟而達之君臣父子夫婦昆弟朋友無非物也而莫不有法焉如視之明聴之聰貌之㳟言之忠君臣有義父子有親之類是也是乃民所執之常性故其情無不好此美德者即人所得乎天之初性也特憫我人染於習欲遂反其性而出之則所爲多惡然視爾於神室之中有能以為惡之靣目靦然見本來靣目乎於此而自恥則人盡見天大天尊與諸天帝君實皆有儀可以觀象我當以人法天則今雖失德而反求我本來之美德天例有不加惡悔罪之條自不於我而獨棄此我即於平旦氣清之際以復求天付之良心行之日用事物之間不敢懈怠暇逸不啻天復與我以明德而可以法天體道以行矣懴禱已陳㳟申諷詠稽首皈依無上道諸天諸帝諸聖御無邊赫濯厥聲靈凡曰有生均覆䕶曩謨心印授至真符誥金書傳利益我今遭遇得受持惟願慈悲垂法庇一心回向九天心印會上大慈尊三稱下土小兆某等伏聞天垂象見吉凶聖人則之我亦人也人當希聖今應投誠一心敬禮一心敬禮北斗聖父周御國土天尊北斗聖母紫光聖德天后北斗高上玉皇府尊星君北斗北極玄卿府帝星君北斗左宫太素八景元君北斗右宫太素七晨元君北斗陽明太尉府天英星君北斗隂精上宰府天任星君北斗真人司空府天柱星君北斗玄冥遊擊府天心星君北斗丹元斗君府天禽星君北斗北極太常府天輔星君北斗天關上帝府天冲星君北斗洞明玉帝府天芮星君北斗隱光帝真府天蓬星君北斗玄斗宫魁精玄上真皇夫人北斗玄魁宫靈精上元真皇夫人北斗上精宫靈妃主仙元皇夫人北斗綱極宫上靈神妃華皇夫人北斗靈開宫北上金葢中皇夫人北斗紫極宫安上晨華元皇夫人北斗運天宫玉華北葢靈皇夫人北斗空真宫尊帝九晨左皇夫人北斗常寳宫帝尊元晨右皇夫人北斗九府九宫中上道協運星君南斗六司六座星君東西中正三斗星君天罡大聖節度萬真奎光大帝君上台司命虚精星君中台司空六淳星君下台司祿曲生星君玄都十一大曜星君五方五精五鎮星君二十八宿列座星君三十六座天罡星君二十四炁節度星君六十生命元辰星君普天星斗萬象羣真周天度列曜羣真斗府玄曹合屬官將信禮已周仰對慈尊㳟申懴禱某等伏思維北有斗不尚息焉有嘒其星昭回於天濯濯厥靈照臨下土瘼此下民靡瞻靡顧赫赫在上昭假無贏胡不相畏遹求厥𡨴庶民小子肅肅謝功庶無罪悔高朗令終斗北極也息休息也嘒明貌星衆星也昭明也濯濯光明也瘼病也瞻謂望之而敬畏也顧謂顧忌也赫赫如火耀光之貌假至也贏餘也威畏也遹從也庶民小子呼而告之之辭肅肅齋莊虔恪之貌謝謂懴謝也令善也言中天有北極晝夜周旋未嘗少息而嘒然衆星有凶有吉則周回而明昭於天其濯濯然之光明無不照臨於下土則民之爲善爲惡無所不見無所不知下民不知自脩其心德而日趨於惡及星象已現吉凶而又無所顧忌故不得不降以凶禍寡則刑傷疾病衆則水火兵荒之類是也是知明然在上之諸星其賞善罰惡皆昭察周至而一無餘免者下民胡然而不生畏憚之心從此遷善改過以求安𡨴哉凡我庶民凡我小子皆當齋莊虔恪而懴謝以脩功庶幾可無罪悔而本命星光既高且朗以保善終矣懴禱已陳㳟申諷詠稽首皈依摩利支諸星諸宿諸辰曜無邊赫奕大光明凡曰有生均稟氣曩謨金葢覲中皇奉勅開壇而立極兆生歴刼聆聖謨惟願吉祥來擁䕶一心回向九天心印會上大慈尊三稱下土小兆某等伏聞在天成象在地成形惟地有神承天效法今應投誠一心敬禮一心敬禮九地九壘土府皇君七十二地地主皇君五嶽聖帝四瀆源王十洲三島主者仙官名山大川主者仙官洞天福地主者仙官皇朝祀典廟貌神袛萬法靈壇雷司官將酆都六洞主者靈官十殿㝠王判府官衆皇朝京省隍社大神信禮已周仰對慈尊㳟申懴禱某等伏思相土烈烈克配彼天綏萬邦屡豐年如江如漢如山如河無不克鞏百禄是何海外有截卭有旨苕其人如玉于焉逍遥維嶽降神斤斤其明相其隂陽貊其徳音允也天子上帝是皇懷柔百神日靖四方廼立冡土惠我無疆作廟奕奕金玉其相我將我享雝雝在宫命我衆人莫不率從肅雝顯相神罔時恫𩱛假無言靡神不宗率履不越萬福來同土地也烈烈厚德光大之象綏安也屡每也鞏固也何荷也負也截齊也卭水中之大洲也旨美也苕苕饒也莖如勞豆而細葉如蒺藜而青其莖葉綠色如小豆藿可生食乃仙草也嶽五嶽也斤斤察也貊默也謂默然而清靜也允信也肯也皇辟也法也懷來也柔安也靖安靖也冡土隍社諸神也疆邊也作教䕶屬功而課章程也奕奕嚴整也金謂雕金也玉謂琢玉也相質也將奉也享謂享於神明也雝雝和之至也宫謂壇所也肅敬也相助也恫痛恨也𩱛進也假感格也無言肅㳟而齊一也宗尊奉也率循也履禮也越過也同會也言視地之厚德光大萬物資生其德直配于天蓋舉其元體則安奠萬邦言其功用則屡慶豐年即如江之泳如漢之廣如山之高如河之遠皆有神主以保固民基生百物以爲民禄是民實荷其生成也而海外之名山大川三島十洲皆方齊環列多産靈草木歴世登仙聚形如玉之神人所遊息焉夫地之所載莫大于山山之最尊曰五嶽五嶽之神皆曰聖帝徧差神人降于下土監察甚明以廵四海九州之内𨶒浮世界之中皆具默然清靜公明之德者也舉嶽而瀆在其中焉聖天子允文允武乃聖乃神奉天承運惟天是法勅封諸神建壇錫號以徠安其靈俾助皇朝保佑四方安靖萬姓乃復徧立各省府縣隍社神員使司疆土以福惠我民普建廟貌莊嚴整肅金玉輝煌起人敬畏是皆保佑我民者也我民應有以奉之夫神人所憑在德則宜脩我明德以爲孝享和平我心達于壇庭如率衆禮則誦命我衆人二句言率我同心脩道之人皆從我而交接神人也如一人禮則誦肅雝顯相二句言㳟敬和平以我明德助神新民則神自無痛恨于我也故我進壇庭以感格神明外而肅㳟我容内而齊一我心則凡在天爲神在地爲靈無不享我之尊奉我惟常循禮法不敢踰越神人自以萬端之福來會于我矣懴禱已陳㳟申諷詠稽首皈依皇理禁諸仙諸聖諸靈衆無邊正直與聰明凡曰有生均德載曩謨心印放光明幽延普乘津涯濟我今與物共資生惟願咸登仁壽境一心回向九天心印會上大慈尊三稱下土小兆某等伏聞天策焞焞人其代之先民時若寅亮天工今應投誠一心敬禮一心敬禮祖師玄圃梵仙虚陀大帝祖師六合無窮高明大帝祖師垂恩廣救慈悲大帝祖師神功妙濟天醫大帝祖師真靈廣救玄梵大帝九天心印經籍度三師真君九天心印監齋大法師真君九天心印傳道付法歴代師尊九天心印傳經示懴歴代師尊信禮已周仰對慈尊㳟申懴禱某等伏思宣哲維人在帝左右曰求厥章克開厥後昭假烈祖克廣德心致天之届懷我好音假以溢我休有烈光有引有翼四方之綱我應受之自今伊始日就月將不遠伊邇念兹皇祖賚我思成紹庭上下以保明其身宣通也哲智也帝上帝也左右旁側也章指集經三卷也開導也烈祖謂請法傳經諸祖即經中虚陀請法三省傳經玄梵纂脩之大烈也廣推而大之也德心善意也致者經營而成之之辭届極也好音謂經中之法言也溢恤也休福也烈功烈也光光明也引引導也翼輔翼也綱維也應接也將進也皇祖即烈祖蓋虚陀帝君與張葛許陸四祖於龍漢赤明之際皆受皇人妙號如天真皇人之類是也賚與也思成謂我所思而成之者也紹繼也言諸祖師皆具六通睿智之人無日不在上帝之側求此寶章以導我後人於至善此皆神明應感之烈祖克廣其功德之心故致天之極以付我是經是大發度世婆心於我下土也人能受持此經者當得無疆之休立大功德具大光明常有吉神引其前後翼其左右蓋此經此法實爲四方萬世之綱維我今得受是經即當自今日始信受奉行庶翼日有所就月有所進自不遠於天而近於道切念我祖師既與我以思成之路則當繼其遺緒而上下於天庭以保固明德於我身斯不負玉帝天恩道君慈度列祖傳經示懴之深望也夫懴禱已陳㳟申諷詠稽首皈依諸聖師垂恩普度人間世傳經功德亦無量凡曰有生均化育曩謨元命贊文尼道包德奥而神化我今依教謹受持惟願慈悲來印證一心回向九天心印會上大慈尊三稱簡甲全簡乙下土小兆某等伏聞心心相印聖聖相傳惟我祖師其來有自今應投誠一心敬禮一心敬禮祖師青尼老聃玄玄皇帝祖師後聖闗尹金闕帝君祖師全真教主少陽帝君祖師傳道垂教正陽帝君祖師興行妙道純陽帝君信禮已周仰對慈尊㳟申懴禱某等伏思玄王桓撥赫赫明明世德作求遹駿有聲念兹皇祖不顯不承我其收之子孫其湛玄王玄玄皇帝也桓武也撥啓發也赫赫命之顯也明明德之明也世德謂自後聖以下世脩玄玄之道德也求逑也匹也駿大而疾也有聲聲教訖於四海也皇祖謂純陽帝君也帝君於龍漢赤明之際應號文尼至真皇人猶言皇人祖師也不顯猶言豈不顯也不承猶言豈不承也收